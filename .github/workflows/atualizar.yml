name: Atualizar Página Estática com Notion

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *' # Executa todos os dias às 06:00 AM UTC (opcional)
  workflow_dispatch: # Permite que executes manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Navegadores do Playwright
      run: |
        playwright install chromium --with-deps

    - name: Executar Script de Extração
      run: python atualizar_links.py

    - name: Fazer Commit e Push do index.html gerado
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        # Só faz o commit se houver alterações no HTML para evitar erros
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automação: Links atualizados do Notion" && git push)
